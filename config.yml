  # About
  about:
    enable: true
    title: "About Me"
    image: "/uploads/self.jpeg"
    content: |-
      Robotics software engineer with over 10 years of experience shipping real-time robot software in C++. At Franka Robotics, I spent 7 years building the behavior stack and the open-source control interface for one of the most widely used collaborative robots in research — and co-invented 7 patents on dual-arm coordination and impedance control along the way.

      Today I work as a freelance roboticist, combining CANOpen, modern C++, ROS 2, and control theory to build things that move. I'm equally comfortable working close to the hardware as I am designing high-level robot behaviors or setting up CI/CD pipelines.

      I'm open to interesting collaborations — especially in real-time control, robotics software, and open-source tooling.

    skills:
      enable: true
      title: "Technologies I work with"
      items:
        - "C++ 11/14/17/20"
        - "Python"
        - "ROS / ROS 2"
        - "Real-time Control"
        - "Kinematics"
        - "CANOpen / CiA-402"
        - "Linux"
        - "Git"
        - "Docker"
        - "CI/CD"
        - "CUDA"
        - "Nvidia Omniverse"

