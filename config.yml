  # Services (using achievements section)
  achievements:
    enable: true
    title: "Services"
    items:
      - title: Real-time C++ Development
        content: High-performance robot software in modern C++ (up to C++20) with deterministic timing guarantees for 1 kHz control loops and safety-critical systems.
      - title: ROS 2 Integration & Migration
        content: Full-stack ROS 2 development — from custom controllers and hardware interfaces via ros2_control to system-level architecture and launch infrastructure.
      - title: CANOpen / Fieldbus Integration
        content: CiA-402 compliant motor drivers, CANOpen device profiles, and hardware abstraction layers connecting industrial fieldbuses to ROS.
      - title: Digital Twin & Simulation
        content: Nvidia Omniverse-based simulators, automated URDF generation, and virtual hardware devices for hardware-free testing and validation.
      - title: Robot Software Architecture
        content: Behavior stacks, state machines, CI/CD pipelines, and profiling toolchains for maintainable, testable robot software at scale.

  # Projects
  projects:
    enable: true
    title: "Open Source"
    items:
      - title: Koch Robot Teleop
        content: Claw-machine-style teleoperation of 3D-printed Koch robots using ESP32, picoRoS, Zenoh, screw theory kinematics, and ros2_control.
        image: https://raw.githubusercontent.com/Maverobot/koch_ros/main/demo.gif
        badges:
          - "ROS 2"
          - "ros2_control"
          - "Screw Theory"
          - "ESP32"
        links:
          - icon: fab fa-github
            url: https://github.com/Maverobot/koch_ros

      - title: ob-lean4
        content: Emacs org-babel package for evaluating Lean 4 code blocks — bringing interactive theorem proving into org-mode notebooks.
        image: https://lean-lang.org/static/png/lean-logo-official-TM-white-2400x900.png
        badges:
          - "Emacs Lisp"
          - "Lean 4"
          - "Org-babel"
        links:
          - icon: fab fa-github
            url: https://github.com/Maverobot/ob-lean4

      - title: Libtorch Examples
        content: Collection of C++ examples using PyTorch's libtorch frontend — covering function approximation, LSTM, and time series prediction.
        image: https://pytorch.org/assets/images/pytorch-logo.png
        badges:
          - "C++"
          - "PyTorch"
          - "CMake"
        links:
          - icon: fab fa-github
            url: https://github.com/Maverobot/libtorch_examples

      - title: PlanarMechanics
        content: Open-source Modelica library for planar multi-body mechanical systems, developed at DLR.
        image: https://raw.githubusercontent.com/dzimmer/PlanarMechanics/master/PlanarMechanics/Resources/Images/Examples/CraneCrab_1.png
        badges:
          - "Modelica"
          - "Multi-body"
        links:
